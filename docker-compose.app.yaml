---
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-php
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://app:SecurePassword123@database:5432/app?serverVersion=16&charset=utf8"
      APP_ENV: dev
    volumes:
      - ./:/app
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
    networks:
      - app-network

  adminer:
    build:
      context: .
      dockerfile: Dockerfile.adminer
    container_name: app-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - app-network

  composer:
    build:
      context: .
      dockerfile: Dockerfile.composer
    container_name: app-composer
    volumes:
      - ./:/app
    networks:
      - app-network
    profiles:
      - tools

volumes: {}

networks:
  app-network:
    external: true
    name: app-network
