---
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: frankenphp_base
    container_name: app-php
    restart: unless-stopped
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      DEFAULT_URI: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure}
      MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}
      SYMFONY_VERSION: ${SYMFONY_VERSION:-}
      STABILITY: ${STABILITY:-stable}
      DATABASE_URL: "postgresql://app:SecurePassword123@database:5432/app?serverVersion=16&charset=utf8"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./:/app
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp
    networks:
      - app-network

  adminer:
    build:
      context: .
      dockerfile: Dockerfile.adminer
    container_name: app-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    networks:
      - app-network

  composer:
    build:
      context: .
      dockerfile: Dockerfile.composer
    container_name: app-composer
    volumes:
      - ./:/app
    networks:
      - app-network
    profiles:
      - tools

volumes:
  caddy_data:
  caddy_config:

networks:
  app-network:
    external: true
    name: app-network
